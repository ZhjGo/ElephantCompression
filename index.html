<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小象压图 - 纯前端图片本地无损压缩</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Typography & Base Variables */
        :root {
            --apple-bg: #F5F5F7;
            --apple-text: #1D1D1F;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 24px -8px rgba(0, 0, 0, 0.05);
        }

        /* Fluid Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .progress-stripes {
            background-image: linear-gradient(45deg,
                    rgba(255, 255, 255, 0.15) 25%,
                    transparent 25%,
                    transparent 50%,
                    rgba(255, 255, 255, 0.15) 50%,
                    rgba(255, 255, 255, 0.15) 75%,
                    transparent 75%,
                    transparent);
            background-size: 1rem 1rem;
            animation: moveStripes 1s linear infinite;
        }

        @keyframes moveStripes {
            from {
                background-position: 1rem 0;
            }

            to {
                background-position: 0 0;
            }
        }

        /* Hide Scrollbar but keep functionality */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col relative overflow-x-hidden selection:bg-blue-200">

    <header class="fixed top-0 w-full glass-panel z-50 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer group">
                <svg viewBox="0 0 24 24" width="32" height="32" xmlns="http://www.w3.org/2000/svg" class="group-hover:scale-110 transition-transform duration-300">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#2563eb" />
                            <stop offset="100%" stopColor="#10b981" />
                        </linearGradient>
                    </defs>
                    <rect width="24" height="24" rx="6" fill="url(#logoGrad)" />
                    <path d="M19,13.5 A1.5,1.5 0 0,0 20.5,12 C20.5,8 16.5,6 12,6 C7.5,6 4.5,9 4.5,13.5 C4.5,14 4.8,14.5 5.2,14.5 L7.5,14.5 L7.5,18 A1.2,1.2 0 0,0 9.9,18 L9.9,14.5 L11.5,14.5 L11.5,18 A1.2,1.2 0 0,0 13.9,18 L13.9,12.5 C13.9,11.5 14.5,10.5 15.5,10.5 C16.5,10.5 17,11.5 17,12.5 L17,17 A2,2 0 0,0 19,19 C20.5,19 21,18 21,16 A1,1 0 0,0 19.5,17 C19,17 18.5,16.5 18.5,16 L18.5,12.5 L19,13.5 Z" fill="#ffffff" />
                    <circle cx="10" cy="10" r="1.2" fill="url(#logoGrad)" />
                </svg>
                <span class="font-semibold text-lg tracking-tight">小象压图</span>
            </div>
            <nav class="hidden md:flex gap-8 text-sm font-medium text-gray-500">
                <a href="#" class="hover:text-black transition-colors duration-300">产品特色</a>
                <a href="#" class="hover:text-black transition-colors duration-300">API 接入</a>
                <a href="#" class="hover:text-black transition-colors duration-300">定价方案</a>
            </nav>
            <button class="md:hidden text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
            </button>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-24 px-4 sm:px-6 flex flex-col items-center relative">
        <div
            class="absolute top-20 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-blue-400/20 rounded-full blur-[100px] pointer-events-none -z-10">
        </div>
        <div
            class="absolute top-40 left-1/3 -translate-x-1/2 w-[400px] h-[400px] bg-emerald-400/10 rounded-full blur-[80px] pointer-events-none -z-10">
        </div>

        <div class="text-center max-w-3xl mb-12 animate-fade-in-up">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-6 text-[#1D1D1F]">
                极致压缩，<br class="md:hidden" />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-emerald-500">肉眼无损。</span>
            </h1>
            <p class="text-lg md:text-xl text-gray-500 font-medium leading-relaxed max-w-2xl mx-auto">
                将现代图像压缩算法与 Apple 级别的优雅体验融为一体。<br class="hidden md:block" /> 在保持极高视觉品质的同时，为您节省高达 80% 的存储空间。
            </p>
        </div>

        <div id="dropzone"
            class="w-full max-w-4xl glass-panel rounded-[2.5rem] border-[2.5px] border-dashed border-gray-300/80 p-12 sm:p-20 flex flex-col items-center justify-center cursor-pointer transition-all duration-500 hover:border-blue-500/50 hover:bg-white/80 hover:shadow-2xl hover:shadow-blue-500/10 hover:-translate-y-1 group">
            <input type="file" id="fileInput" class="hidden" multiple accept="image/png, image/jpeg, image/webp">

            <div
                class="w-24 h-24 bg-white rounded-3xl shadow-sm flex items-center justify-center mb-6 group-hover:-translate-y-2 group-hover:shadow-md transition-all duration-500 ease-out border border-gray-100">
                <span class="text-5xl drop-shadow-sm">📤</span>
            </div>

            <h3 class="text-2xl font-semibold mb-3 text-gray-800">将图片拖拽至此</h3>
            <p class="text-gray-400 font-medium mb-8 text-center">支持 .png, .jpg 或 .webp 文件格式</p>

            <button
                class="px-8 py-3.5 bg-[#1D1D1F] text-white rounded-full font-medium hover:bg-black transition-all duration-300 hover:shadow-lg hover:-translate-y-0.5 active:scale-95 shadow-gray-900/20">
                点击选择文件
            </button>
        </div>

        <div id="list-container" class="w-full max-w-4xl mt-8 flex flex-col gap-4 empty:mt-0">
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');
            const listContainer = document.getElementById('list-container');

            // --- 拖拽交互逻辑 ---
            const preventDefaults = (e) => {
                e.preventDefault();
                e.stopPropagation();
            };

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropzone.addEventListener(eventName, preventDefaults, false);
            });

            // 进入拖拽热区状态
            ['dragenter', 'dragover'].forEach(eventName => {
                dropzone.addEventListener(eventName, () => {
                    dropzone.classList.add('border-blue-500', 'bg-blue-50/40', 'scale-[1.02]');
                    dropzone.classList.remove('border-gray-300/80', 'glass-panel');
                }, false);
            });

            // 离开拖拽热区状态
            ['dragleave', 'drop'].forEach(eventName => {
                dropzone.addEventListener(eventName, () => {
                    dropzone.classList.remove('border-blue-500', 'bg-blue-50/40', 'scale-[1.02]');
                    dropzone.classList.add('border-gray-300/80', 'glass-panel');
                }, false);
            });

            // 处理拖拽释放与点击上传
            dropzone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            });

            dropzone.addEventListener('click', (e) => {
                // 防止点击上传按钮时触发两次
                if (e.target.tagName !== 'BUTTON') {
                    fileInput.click();
                } else {
                    fileInput.click();
                }
            });

            fileInput.addEventListener('change', function () {
                handleFiles(this.files);
                this.value = ''; // 允许重复上传同一文件
            });

            // --- 核心工具函数 ---
            // 字节格式化转换
            const formatBytes = (bytes, decimals = 1) => {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            };

            // 缓动函数：让进度条看起来更加自然（先快后慢）
            const easeOutQuart = (x) => {
                return 1 - Math.pow(1 - x, 4);
            };

            // --- 文件处理与 UI 渲染 ---
            const handleFiles = (files) => {
                ([...files]).forEach(processFile);
            };

            const processFile = (file) => {
                // 仅验证图片格式
                if (!file.type.startsWith('image/')) return;

                const id = Math.random().toString(36).substring(2, 10);
                const originalSize = file.size;
                const originalSizeStr = formatBytes(originalSize);

                // 构建 DOM 结构（采用 Tailwind + 自定义动画）
                const itemHTML = `
                    <div id="item-${id}" class="glass-panel rounded-3xl p-5 sm:px-6 flex items-center gap-5 animate-fade-in-up opacity-0" style="animation-delay: 0.1s;">
                        <div class="w-14 h-14 bg-white/80 rounded-2xl flex items-center justify-center flex-shrink-0 border border-gray-200/50 shadow-sm">
                            <span class="text-3xl drop-shadow-sm">🖼️</span>
                        </div>
                        
                        <div class="flex-grow min-w-0">
                            <div class="flex justify-between items-center mb-2.5">
                                <span class="font-semibold text-[15px] truncate text-gray-900 pr-4">${file.name}</span>
                                <span class="text-xs font-medium text-blue-500 whitespace-nowrap transition-colors duration-300" id="status-text-${id}">压缩中...</span>
                            </div>
                            
                            <div id="progress-container-${id}" class="h-2 w-full bg-gray-200/50 rounded-full overflow-hidden transition-all duration-500">
                                <div id="progress-bar-${id}" class="h-full bg-blue-500 rounded-full progress-stripes w-0 transition-all duration-300 ease-out"></div>
                            </div>
                            
                            <div id="result-container-${id}" class="hidden items-center justify-between mt-1 opacity-0 transition-opacity duration-500">
                                <div class="flex items-center gap-3">
                                    <span class="text-[13px] text-gray-400 line-through decoration-gray-300 font-medium">${originalSizeStr}</span>
                                    <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                    <span class="text-[13px] text-gray-900 font-semibold" id="new-size-${id}"></span>
                                    <span class="px-2 py-0.5 rounded-md bg-emerald-100/80 text-emerald-600 text-xs font-bold tracking-tight shadow-sm border border-emerald-200/50" id="badge-${id}"></span>
                                </div>
                                <button class="text-sm font-semibold text-white bg-blue-500 hover:bg-blue-600 px-4 py-1.5 rounded-full transition-all duration-300 hover:shadow-md hover:shadow-blue-500/20 active:scale-95">
                                    下载
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                // 插入列表顶部
                listContainer.insertAdjacentHTML('afterbegin', itemHTML);

                // 启动逼真的压缩模拟
                simulateCompression(id, originalSize);
            };

            const simulateCompression = (id, originalSize) => {
                const progressBar = document.getElementById(`progress-bar-${id}`);
                const progressContainer = document.getElementById(`progress-container-${id}`);
                const resultContainer = document.getElementById(`result-container-${id}`);
                const statusText = document.getElementById(`status-text-${id}`);
                const newSizeEl = document.getElementById(`new-size-${id}`);
                const badgeEl = document.getElementById(`badge-${id}`);

                // 模拟压缩率 (40% - 85% 之间)
                const savingRatio = Math.random() * (0.85 - 0.40) + 0.40;
                const newSize = originalSize * (1 - savingRatio);

                // 模拟网络延迟与处理时间 (1500ms - 3500ms)
                const duration = Math.floor(Math.random() * 2000) + 1500;
                const fps = 60;
                const totalFrames = (duration / 1000) * fps;
                let currentFrame = 0;

                const animateProgress = () => {
                    currentFrame++;
                    const progress = currentFrame / totalFrames;
                    const easedProgress = easeOutQuart(progress);

                    progressBar.style.width = `${Math.min(easedProgress * 100, 100)}%`;

                    if (currentFrame < totalFrames) {
                        requestAnimationFrame(animateProgress);
                    } else {
                        // 压缩完成，平滑切换状态
                        setTimeout(() => {
                            // 隐藏进度条区域
                            progressContainer.style.height = '0px';
                            progressContainer.style.opacity = '0';
                            progressContainer.style.margin = '0';

                            setTimeout(() => {
                                progressContainer.classList.add('hidden');

                                // 显示结果面板
                                resultContainer.classList.remove('hidden');
                                resultContainer.classList.add('flex');

                                // 强制重绘以确保透明度动画生效
                                void resultContainer.offsetWidth;
                                resultContainer.classList.remove('opacity-0');

                                // 更新状态文案和数据
                                statusText.className = "text-xs font-bold text-emerald-500";
                                statusText.textContent = "完成";
                                newSizeEl.textContent = formatBytes(newSize);
                                badgeEl.textContent = `-${Math.round(savingRatio * 100)}%`;

                            }, 300); // 配合进度条收起的动画时间
                        }, 200); // 稍作停顿，让用户看清 100%
                    }
                };

                // 启动帧动画
                requestAnimationFrame(animateProgress);
            };
        });
    </script>
</body>

</html>
